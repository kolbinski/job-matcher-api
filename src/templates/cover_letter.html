<!doctype html>
<html lang="{{LANG}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{CL_TITLE}}</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
        font-size: 13px;
        color: #1a1a1a;
        background: #fff;
        line-height: 1.65;
      }
      .cl {
        max-width: 820px;
        margin: 0 auto;
        padding: 24px 48px;
      }
      h1 {
        font-size: 26px;
        font-weight: 700;
        color: #1a1a1a;
        letter-spacing: -0.3px;
      }
      .target-role {
        font-size: 14px;
        color: #1a1a1a;
        font-weight: 600;
        margin: 3px 0 8px;
      }
      .contacts {
        font-size: 12px;
        color: #4a4a4a;
        display: flex;
        flex-wrap: wrap;
      }
      .contacts a {
        color: #1a1a1a;
        text-decoration: none;
      }
      .sep {
        margin: 0 8px;
        color: #d0d0d0;
      }
      .meta {
        margin-top: 32px;
        margin-bottom: 32px;
      }
      .date-location {
        font-size: 12.5px;
        color: #4a4a4a;
        text-align: right;
        margin-bottom: 24px;
        white-space: nowrap;
      }
      .re-line {
        font-size: 13px;
        font-weight: 600;
        color: #1a1a1a;
        margin-bottom: 24px;
      }
      .body-text p {
        font-size: 13px;
        color: #1a1a1a;
        margin-bottom: 16px;
        line-height: 1.7;
      }
      .signature {
        margin-top: 40px;
        font-size: 13px;
        color: #1a1a1a;
      }
      .signature .sign-label {
        color: #4a4a4a;
        margin-bottom: 8px;
      }
      .signature .sign-name {
        font-weight: 600;
        font-size: 13.5px;
      }
      hr {
        border: none;
        border-top: 1.5px solid #d0d0d0;
        margin: 24px 0;
      }
      @media print {
        @page {
          margin: 15mm 10mm;
        }
        .cl {
          padding: 0 48px;
        }
        a {
          color: inherit !important;
          text-decoration: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="cl">
      <header
        style="
          display: flex;
          align-items: flex-start;
          justify-content: space-between;
        "
      >
        <div>
          <h1>{{FULL_NAME}}</h1>
          <div class="target-role">{{TARGET_ROLE}}</div>
          <div class="contacts">{{CONTACTS}}</div>
        </div>
        <div class="date-location" style="margin-top: 4px">
          {{CITY}}, {{DATE}}
        </div>
      </header>

      <div class="meta">
        <div class="re-line">
          Re: {{JOB_TITLE}} position at {{COMPANY_NAME}}
        </div>
      </div>

      <div class="body-text">{{BODY}}</div>

      <div class="signature">
        <div class="sign-label">{{LABEL_REGARDS}}</div>
        <div class="sign-name">{{FULL_NAME}}</div>
      </div>

      <hr />
      {{FOOTER_NOTES}}
    </div>
  </body>
</html>
